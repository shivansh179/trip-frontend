name: Deploy to Vercel (trip-frontend)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel (Production)
        run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_Wx9Gx8x1ojhNR9cWzCMMRtoc
          VERCEL_PROJECT_ID: prj_9F4uHTvRAstUZteMfEqcJK9fmLnN
